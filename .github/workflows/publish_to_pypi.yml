name: Build and Publish

on:
  workflow_dispatch:
    inputs:
      build_mode:
        description: "Native dependency build mode"
        required: true
        default: "lunapi"
        type: choice
        options:
          - lunapi
          - luna
          - all

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    env:
      DEPENDS_CACHE_DIR: ${{ github.workspace }}/depends-cache/${{ matrix.os }}
      NATIVE_DEPS_CACHE_VERSION: v2
      # Important usage note:
      # 1. Run once with NATIVE_DEPS_MODE: all to seed full cache payload for the new structure.
      # 2. Then switch to NATIVE_DEPS_MODE: lunapi for fast runs.
      # 3. Use NATIVE_DEPS_MODE: luna when only libluna.a needs rebuilding.
      # Native build mode:
      # - all: rebuild FFTW + LightGBM + libluna, then build lunapi
      # - luna: reuse cached FFTW/LightGBM, rebuild libluna, then build lunapi
      # - lunapi: reuse cached FFTW/LightGBM/libluna, build lunapi only
      NATIVE_DEPS_MODE: ${{ inputs.build_mode }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            job_name: "Ubuntu AMD64 Build"
          - os: macos-15
            job_name: "MacOS 15 ARM64 Build"
          - os: macos-15-intel
            job_name: "MacOS 15 x86_64 Build"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install setuptools wheel twine

      - name: Ensure native cache directory exists
        run: mkdir -p "${DEPENDS_CACHE_DIR}"

      - name: Restore native dependency cache
        id: native_deps_cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.DEPENDS_CACHE_DIR }}
          key: native-deps-${{ env.NATIVE_DEPS_CACHE_VERSION }}-${{ matrix.os }}-${{ hashFiles('build-linux.sh', 'build-macos.sh', 'CMakeLists.txt.GITHUB', 'CMakeLists.txt.MAC_x86', 'pyproject.toml') }}
          restore-keys: |
            native-deps-${{ env.NATIVE_DEPS_CACHE_VERSION }}-${{ matrix.os }}-

      - name: Native dependency cache summary
        run: |
          echo "Native deps mode: ${NATIVE_DEPS_MODE}"
          echo "Native deps cache hit: ${{ steps.native_deps_cache.outputs.cache-hit }}"
          if [[ "${{ steps.native_deps_cache.outputs.cache-hit }}" == "true" ]]; then
            echo "Reusing cached LightGBM/FFTW/Luna artifacts from ${DEPENDS_CACHE_DIR}"
          else
            echo "Cache miss: dependencies will be rebuilt and cached"
          fi

      - name: Resolve effective native mode
        id: native_mode
        run: |
          requested="${NATIVE_DEPS_MODE}"
          hit="${{ steps.native_deps_cache.outputs.cache-hit }}"
          effective="${requested}"
          if [[ "${hit}" != "true" && "${requested}" != "all" ]]; then
            effective="all"
            echo "Cache miss with requested mode '${requested}'; falling back to '${effective}' for this runner"
          fi
          echo "requested=${requested}" >> "$GITHUB_OUTPUT"
          echo "effective=${effective}" >> "$GITHUB_OUTPUT"
          echo "Using native deps mode: ${effective}"

      # Set per-runner macOS targets
      - name: Set deployment target (macOS)
        if: startsWith(matrix.os, 'macos-')
        run: |
          if [[ "${{ matrix.os }}" == "macos-15-intel" ]]; then
            echo "MACOSX_DEPLOYMENT_TARGET=10.14" >> $GITHUB_ENV
            echo "CMAKE_OSX_DEPLOYMENT_TARGET=10.14" >> $GITHUB_ENV
          else
            # macOS-15 / arm64 must be >= 11.0
            echo "MACOSX_DEPLOYMENT_TARGET=11.0" >> $GITHUB_ENV
            echo "CMAKE_OSX_DEPLOYMENT_TARGET=11.0" >> $GITHUB_ENV
          fi

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21.3
        env:
          CIBW_ARCHS_MACOS: "native"     # macos-15-intel => x86_64, macos-15 => arm64
          CIBW_ARCHS_LINUX: "x86_64"

          # Avoid slow ninja build-from-source
          CIBW_BEFORE_BUILD: "python -m pip install -U pip setuptools wheel 'ninja==1.11.1.1'"
          CIBW_ENVIRONMENT: "PIP_ONLY_BINARY=ninja DEPENDS_CACHE_DIR=${{ env.DEPENDS_CACHE_DIR }} NATIVE_DEPS_MODE=${{ steps.native_mode.outputs.effective }}"

          CIBW_BEFORE_ALL_LINUX: "DEPENDS_CACHE_DIR=/project/depends-cache/${{ matrix.os }} NATIVE_DEPS_MODE=${{ steps.native_mode.outputs.effective }} sh build-linux.sh"
          CIBW_BEFORE_ALL_MACOS: "DEPENDS_CACHE_DIR=${{ env.DEPENDS_CACHE_DIR }} NATIVE_DEPS_MODE=${{ steps.native_mode.outputs.effective }} sh build-macos.sh"
          CIBW_BEFORE_ALL_WINDOWS: " "

          # Ensure delocate uses the same archs; tag will match MACOSX_DEPLOYMENT_TARGET
          CIBW_REPAIR_WHEEL_COMMAND_MACOS: "delocate-wheel --require-archs {delocate_archs} -w {dest_dir} {wheel}"

          # Python versions
          CIBW_BUILD: "cp39-* cp310-* cp311-* cp312-* cp313-* cp314-*"

        with:
          output-dir: wheelhouse

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

      - name: Native cache directory contents
        if: always()
        run: |
          echo "DEPENDS_CACHE_DIR=${DEPENDS_CACHE_DIR}"
          ls -la "${DEPENDS_CACHE_DIR}" || true

      - name: Check native cache payload
        if: always()
        id: native_cache_payload
        run: |
          if find "${DEPENDS_CACHE_DIR}" -mindepth 1 -print -quit | grep -q .; then
            echo "has_files=true" >> "$GITHUB_OUTPUT"
            echo "Native cache payload present"
          else
            echo "has_files=false" >> "$GITHUB_OUTPUT"
            echo "Native cache payload missing (directory is empty)"
          fi

      - name: Save native dependency cache
        if: always() && steps.native_deps_cache.outputs.cache-hit != 'true' && steps.native_cache_payload.outputs.has_files == 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ env.DEPENDS_CACHE_DIR }}
          key: native-deps-${{ env.NATIVE_DEPS_CACHE_VERSION }}-${{ matrix.os }}-${{ hashFiles('build-linux.sh', 'build-macos.sh', 'CMakeLists.txt.GITHUB', 'CMakeLists.txt.MAC_x86', 'pyproject.toml') }}

      - name: Publish to PyPI
        run: twine upload wheelhouse/*.whl --verbose --skip-existing
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
